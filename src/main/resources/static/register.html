<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register</title>
    <link rel="stylesheet" href="css/register.css" />
  </head>
  <body>
    <form class="form">
      <p class="title">Register</p>
      <p class="message">Signup now and get full access to our app.</p>
      <div class="flex">
        <label>
          <input
            required=""
            placeholder=""
            type="text"
            class="input"
            id="first-name"
          />
          <span>Firstname</span>
        </label>

        <label>
          <input
            required=""
            placeholder=""
            type="text"
            class="input"
            id="last-name"
          />
          <span>Lastname</span>
        </label>
      </div>

      <label>
        <input
          required=""
          placeholder=""
          type="email"
          class="input"
          id="email"
        />
        <span>Email</span>
      </label>

      <label>
        <input
          required=""
          placeholder=""
          type="password"
          class="input"
          id="password"
        />
        <span>Password</span>
      </label>
      <label>
        <input
          required=""
          placeholder=""
          type="password"
          class="input"
          id="confirm-password"
        />
        <span>Confirm password</span>
      </label>
      <button class="submit" id="submit-button">Submit</button>
      <p class="error" id="error-message"></p>
      <p class="signin">
        Already have an account ? <a href="index.html">Signin</a>
      </p>
    </form>
  </body>
</html>
